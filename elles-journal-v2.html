<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elle's Journal — Martello Command</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💛</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #1a1714;
  --bg-secondary: #1e1b17;
  --gold: #d4af37;
  --gold-bright: #e5c44d;
  --gold-dim: rgba(212, 175, 55, 0.5);
  --gold-faint: rgba(212, 175, 55, 0.12);
  --gold-ghost: rgba(212, 175, 55, 0.04);
  --cream: #e8dcc8;
  --cream-dim: rgba(232, 220, 200, 0.4);
  --cream-ghost: rgba(232, 220, 200, 0.15);
  --danger: rgba(180, 60, 60, 0.6);
  --danger-bright: rgba(200, 70, 70, 0.8);
  --success: rgba(90, 153, 102, 0.8);
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

html { background: var(--bg-primary); }
body {
  font-family: var(--font-serif);
  background: var(--bg-primary);
  color: var(--cream);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  max-width: 960px;
  margin: 0 auto;
  padding: 28px 24px 0;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 16px;
}
.header-brand { flex: 1; min-width: 200px; }
.header-title {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.header-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--gold-dim);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  margin-top: 4px;
}
.header-nav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.nav-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  background: transparent;
  color: var(--gold-dim);
  border: 1px solid rgba(212, 175, 55, 0.2);
  border-radius: 20px;
  padding: 7px 16px;
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
}
.nav-btn:hover {
  color: var(--gold);
  border-color: rgba(212, 175, 55, 0.35);
  background: rgba(212, 175, 55, 0.05);
}
.nav-btn.active {
  color: var(--gold);
  border-color: rgba(212, 175, 55, 0.4);
  background: rgba(212, 175, 55, 0.1);
}
.nav-btn.briefing {
  background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.08));
  border-color: rgba(212, 175, 55, 0.35);
  color: var(--gold);
}
.nav-btn.briefing:hover {
  background: linear-gradient(135deg, rgba(212,175,55,0.25), rgba(212,175,55,0.12));
}
.nav-btn.settings-btn {
  padding: 7px 12px;
  font-size: 14px;
}

/* ── MAIN ── */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 24px 60px;
}
.view { display: none; animation: fadeIn 0.2s ease; }
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── PASTE FROM ELLE BUTTON ── */
.paste-elle-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  background: linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.06));
  color: var(--gold);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 8px;
  padding: 10px 18px;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-bottom: 20px;
  display: inline-block;
}
.paste-elle-btn:hover {
  background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.1));
  border-color: rgba(212,175,55,0.5);
}

/* ── DATE BAR ── */
.date-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-faint) transparent;
}
.date-bar::-webkit-scrollbar { height: 4px; }
.date-bar::-webkit-scrollbar-thumb { background: var(--gold-faint); border-radius: 2px; }
.date-chip {
  min-width: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 8px;
  border: 1px solid rgba(212,175,55,0.12);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  background: transparent;
  flex-shrink: 0;
}
.date-chip:hover {
  border-color: rgba(212,175,55,0.25);
  background: rgba(212,175,55,0.04);
}
.date-chip.active {
  border-color: rgba(212,175,55,0.5);
  background: rgba(212,175,55,0.1);
}
.date-chip.has-entry { border-color: rgba(212,175,55,0.2); }
.date-chip-day {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--gold-dim);
  letter-spacing: 1px;
}
.date-chip-num {
  font-family: var(--font-serif);
  font-size: 20px;
  color: var(--cream);
  font-weight: 400;
}
.date-chip.active .date-chip-num { color: var(--gold); }
.date-chip-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  margin-top: 2px;
}

/* ── DATE DISPLAY + ACTIONS ── */
.date-display {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.date-display-text {
  font-family: var(--font-serif);
  font-size: 20px;
  color: var(--cream);
  opacity: 0.85;
  flex: 1;
}
.action-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  border-radius: 6px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.25s ease;
  border: 1px solid;
}
.btn-primary {
  background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.1));
  border-color: var(--gold);
  color: var(--gold);
}
.btn-primary:hover {
  background: linear-gradient(135deg, rgba(212,175,55,0.3), rgba(212,175,55,0.15));
}
.btn-secondary {
  background: transparent;
  border-color: var(--cream-ghost);
  color: var(--cream-dim);
}
.btn-secondary:hover {
  border-color: rgba(232,220,200,0.3);
  color: var(--cream);
}
.btn-danger {
  background: rgba(180,60,60,0.1);
  border-color: var(--danger);
  color: rgba(220,100,100,0.8);
}
.btn-danger:hover {
  background: rgba(180,60,60,0.2);
  border-color: var(--danger-bright);
}
.btn-copy {
  background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.1));
  border-color: var(--gold);
  color: var(--gold);
}
.btn-copy.copied {
  background: rgba(90,153,102,0.15);
  border-color: var(--success);
  color: var(--success);
}
.btn-wake {
  background: linear-gradient(135deg, rgba(212,175,55,0.35), rgba(212,175,55,0.18));
  border-color: var(--gold-bright);
  color: var(--gold-bright);
  font-weight: 600;
  letter-spacing: 0.5px;
}
.btn-wake:hover {
  background: linear-gradient(135deg, rgba(212,175,55,0.5), rgba(212,175,55,0.25));
  box-shadow: 0 0 16px rgba(212,175,55,0.2);
}
.btn-wake.waking {
  background: rgba(212,175,55,0.3);
  color: var(--gold-bright);
  animation: wakePulse 1s ease infinite;
}
@keyframes wakePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ── JOURNAL READ MODE ── */
.journal-section {
  padding-left: 20px;
  border-left: 2px solid rgba(212,175,55,0.2);
  margin-bottom: 24px;
  animation: slideUp 0.3s ease both;
}
.journal-section:nth-child(2) { animation-delay: 0.04s; }
.journal-section:nth-child(3) { animation-delay: 0.08s; }
.journal-section:nth-child(4) { animation-delay: 0.12s; }
.journal-section:nth-child(5) { animation-delay: 0.16s; }
.journal-section:nth-child(6) { animation-delay: 0.2s; }
.journal-section:nth-child(7) { animation-delay: 0.24s; }
.section-header {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(212,175,55,0.7);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-icon { font-size: 14px; color: var(--gold); }
.section-content {
  font-size: 15px;
  color: rgba(232,220,200,0.85);
  line-height: 1.75;
  white-space: pre-wrap;
}

/* ── EDIT MODE ── */
.edit-form { display: flex; flex-direction: column; gap: 20px; }
.field-group label {
  display: block;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(212,175,55,0.7);
  margin-bottom: 6px;
}
.field-group textarea {
  width: 100%;
  min-height: 80px;
  background: var(--gold-ghost);
  border: 1px solid var(--gold-faint);
  border-radius: 6px;
  padding: 12px 14px;
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--cream);
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color 0.25s ease;
}
.field-group textarea:focus {
  border-color: rgba(212,175,55,0.35);
}
.field-group textarea::placeholder {
  color: var(--cream-dim);
  font-style: italic;
}
.edit-actions {
  display: flex;
  gap: 12px;
  margin-top: 4px;
  flex-wrap: wrap;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--cream-dim);
}
.empty-state-icon { font-size: 36px; margin-bottom: 12px; }
.empty-state-text {
  font-family: var(--font-serif);
  font-size: 17px;
  line-height: 1.6;
}

/* ── SAVE-STATE VIEW ── */
.savestate-section {
  padding-left: 20px;
  border-left: 2px solid rgba(212,175,55,0.2);
  margin-bottom: 24px;
  animation: slideUp 0.3s ease both;
}
.truth-sub {
  margin-left: 12px;
  padding-left: 12px;
  border-left: 1px solid var(--gold-faint);
  margin-top: 8px;
}
.truth-sub-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: rgba(212,175,55,0.5);
  margin-bottom: 4px;
  margin-top: 10px;
}

/* ── BRIEFING VIEW ── */
.briefing-modes {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.briefing-output {
  background: var(--bg-secondary);
  border: 1px solid var(--gold-faint);
  border-radius: 8px;
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  color: rgba(232,220,200,0.8);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 600px;
  overflow-y: auto;
  margin-bottom: 16px;
}
.briefing-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* ── TIMELINE VIEW ── */
.timeline-search {
  width: 100%;
  background: var(--gold-ghost);
  border: 1px solid var(--gold-faint);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--cream);
  outline: none;
  transition: border-color 0.25s ease;
  margin-bottom: 20px;
}
.timeline-search:focus { border-color: rgba(212,175,55,0.35); }
.timeline-search::placeholder { color: var(--cream-dim); }
.timeline-card {
  background: var(--gold-ghost);
  border: 1px solid rgba(212,175,55,0.1);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.25s ease;
  min-height: 48px;
}
.timeline-card:hover {
  background: rgba(212,175,55,0.06);
  border-color: rgba(212,175,55,0.2);
}
.timeline-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.timeline-day {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 500;
  color: var(--gold);
}
.timeline-date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--cream-dim);
}
.timeline-badge-ss {
  font-size: 12px;
  color: var(--gold);
  margin-left: auto;
}
.timeline-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.timeline-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gold-dim);
  background: rgba(212,175,55,0.06);
  border: 1px solid rgba(212,175,55,0.1);
  border-radius: 4px;
  padding: 3px 8px;
}
.timeline-preview {
  font-size: 14px;
  color: rgba(232,220,200,0.5);
  line-height: 1.5;
}

/* ── SETTINGS VIEW ── */
.settings-card {
  background: var(--gold-ghost);
  border: 1px solid var(--gold-faint);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}
.settings-card.danger {
  border-color: var(--danger);
  background: rgba(180,60,60,0.04);
}
.settings-label {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(212,175,55,0.7);
  margin-bottom: 10px;
}
.settings-desc {
  font-size: 14px;
  color: var(--cream-dim);
  margin-bottom: 14px;
  line-height: 1.5;
}
.settings-stat {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--cream-dim);
  margin-bottom: 6px;
}
.settings-about {
  text-align: center;
  padding: 20px;
  color: var(--cream-dim);
  font-size: 13px;
  font-family: var(--font-mono);
}
input[type="file"] { display: none; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.15s ease;
  padding: 20px;
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--gold-faint);
  border-radius: 12px;
  padding: 28px;
  max-width: 640px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title {
  font-family: var(--font-serif);
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 8px;
}
.modal-desc {
  font-size: 14px;
  color: var(--cream-dim);
  margin-bottom: 16px;
  line-height: 1.5;
}
.modal textarea {
  width: 100%;
  min-height: 220px;
  background: var(--gold-ghost);
  border: 1px solid var(--gold-faint);
  border-radius: 6px;
  padding: 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--cream);
  line-height: 1.5;
  resize: vertical;
  outline: none;
  margin-bottom: 16px;
}
.modal textarea:focus { border-color: rgba(212,175,55,0.35); }
.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}
.modal-warning {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(220,100,100,0.7);
  margin-top: 8px;
}

/* ── FOOTER ── */
.footer {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px 24px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(232,220,200,0.2);
}

/* ── DATE NAV ── */
.date-nav-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.date-nav-arrow {
  font-family: var(--font-mono);
  font-size: 16px;
  background: transparent;
  border: 1px solid rgba(212,175,55,0.15);
  color: var(--gold-dim);
  border-radius: 6px;
  width: 32px; height: 32px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.date-nav-arrow:hover {
  border-color: rgba(212,175,55,0.3);
  color: var(--gold);
}
.date-nav-label {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 1px;
  flex: 1;
  text-align: center;
}
.date-nav-today {
  font-family: var(--font-mono);
  font-size: 11px;
  background: transparent;
  border: 1px solid rgba(212,175,55,0.2);
  color: var(--gold-dim);
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.25s ease;
}
.date-nav-today:hover {
  border-color: rgba(212,175,55,0.35);
  color: var(--gold);
}
.date-jump {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--gold-ghost);
  border: 1px solid var(--gold-faint);
  color: var(--cream);
  border-radius: 4px;
  padding: 4px 8px;
  cursor: pointer;
  outline: none;
  color-scheme: dark;
}

/* ── TAGS ── */
.tag-input-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.tag-chip {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.5px;
  color: var(--gold);
  background: rgba(212,175,55,0.08);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 12px;
  padding: 3px 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.tag-chip-remove {
  cursor: pointer;
  opacity: 0.5;
  font-size: 12px;
}
.tag-chip-remove:hover { opacity: 1; }
.tag-input {
  font-family: var(--font-mono);
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--gold-faint);
  border-radius: 12px;
  padding: 3px 10px;
  color: var(--cream);
  outline: none;
  width: 120px;
}
.tag-input:focus { border-color: rgba(212,175,55,0.3); }
.tag-input::placeholder { color: var(--cream-dim); }
.tag-filter {
  font-family: var(--font-mono);
  font-size: 10px;
  background: transparent;
  border: 1px solid rgba(212,175,55,0.12);
  color: var(--cream-dim);
  border-radius: 12px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.tag-filter:hover, .tag-filter.active {
  border-color: rgba(212,175,55,0.3);
  color: var(--gold);
  background: rgba(212,175,55,0.06);
}

/* ── SOURCE SELECTOR ── */
.source-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 14px;
}
.source-row-label {
  font-family: var(--font-mono);
  font-size: 10px;
  opacity: 0.4;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.source-chip {
  font-family: var(--font-mono);
  font-size: 11px;
  background: transparent;
  border: 1px solid rgba(212,175,55,0.12);
  color: var(--cream-dim);
  border-radius: 14px;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}
.source-chip:hover {
  border-color: rgba(212,175,55,0.25);
  color: var(--cream);
  background: rgba(212,175,55,0.04);
}
.source-chip.active {
  border-color: rgba(212,175,55,0.5);
  color: var(--gold);
  background: rgba(212,175,55,0.1);
}
.source-chip.has-content::after {
  content: '';
  position: absolute;
  top: -2px;
  right: -2px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
}
.source-check {
  font-family: var(--font-mono);
  font-size: 11px;

<script>
// ══════════════════════════════════════════════════════
// ELLE'S JOURNAL v2.4 — ARTIFICIAL HIPPOCAMPUS
// ══════════════════════════════════════════════════════

const CATEGORIES = [
  { key: 'highlights',   icon: '✦', label: 'Highlights',      placeholder: 'Big wins, breakthroughs, moments that mattered' },
  { key: 'builds',       icon: '⚙', label: 'What We Built',   placeholder: 'Repos, docs, outreach, deliverables shipped' },
  { key: 'decisions',    icon: '⚖', label: 'Key Decisions',    placeholder: 'Decision → Because rationale → Over alternative rejected' },
  { key: 'openThreads',  icon: '→', label: 'Open Threads',     placeholder: 'Unfinished work, next steps, carry-forward' },
  { key: 'momentum',     icon: '↑', label: 'Momentum',         placeholder: "What's hot, what's accelerating, energy direction" },
  { key: 'personal',     icon: '♥', label: 'Life & Family',    placeholder: 'Family, life, health, personal context' },
  { key: 'vibe',         icon: '~', label: 'Vibe Check',       placeholder: 'Emotional texture, energy level, how we ended' },
];

const SS_FIELDS = [
  { key: 'hotCache',         icon: '⚡', label: 'Hot Cache',          placeholder: '3–7 items with heat: 🔴 urgent (EXPIRES date), 🟡 active, 🟢 background' },
  { key: 'guardrails',       icon: '⚠',  label: 'Guardrails',        placeholder: 'Behavioral constraints — no greetings, no recap, stay in frame' },
  { key: 'antiGoals',        icon: '⛔', label: 'Anti-Goals',         placeholder: 'Do NOT refactor X — it works. Do NOT reopen Y debate — decided.' },
];

// ── SOURCES ──
const DEFAULT_SOURCES = [
  { id: 'default',     label: 'General',      icon: '\u270F' },
  { id: 'claude-chat', label: 'Claude Chat',   icon: '\uD83D\uDCAC' },
  { id: 'claude-code', label: 'Claude Code',   icon: '\u2328' },
  { id: 'cowork',      label: 'Cowork',        icon: '\uD83E\uDD1D' },
];

// ── STORAGE ADAPTER (v3.0 — IndexedDB v3 / localStorage / artifact) ──

// Source helpers
function getAllSources() { return [...DEFAULT_SOURCES, ...(customSources || [])]; }
function getSourceLabel(id) { return getAllSources().find(s => s.id === id)?.label || id; }
function getSourceIcon(id) { return getAllSources().find(s => s.id === id)?.icon || '\u270F'; }
function sourceKey(prefix, date, source) { return `${prefix}:${date}:${source || 'default'}`; }
function parseCompoundKey(key) {
  const parts = key.split(':');
  return { prefix: parts[0], date: parts[1], source: parts.slice(2).join(':') || 'default' };
}

// Helper: build episode record from journal entry + save-state for a date+source
function buildEpisodeRecord(date, source, entry, saveState) {
  const tags = new Set();
  if (entry?.tags) entry.tags.forEach(t => tags.add(t));
  if (saveState?.tags) saveState.tags.forEach(t => tags.add(t));
  if (saveState?.decisions) saveState.decisions.forEach(d => { if (d.workstream) tags.add(d.workstream); });
  return {
    id: `${date}:${source || 'default'}`,
    date,
    source: source || 'default',
    tags: [...tags],
    highlights: entry?.highlights || '', builds: entry?.builds || '',
    decisions: entry?.decisions || '', openThreads: entry?.openThreads || '',
    momentum: entry?.momentum || '', personal: entry?.personal || '', vibe: entry?.vibe || '',
    hasJournal: !!entry && CATEGORIES.some(c => entry[c.key]?.trim()),
    hasSaveState: !!saveState,
    decisionCount: saveState?.decisions?.length || 0,
    timestamp: entry?.timestamp || saveState?.timestamp || new Date().toISOString()
  };
}

const StorageAdapter = {
  isArtifact: typeof window.storage !== 'undefined',
  _backend: null,      // 'artifact' | 'indexeddb' | 'localstorage'
  _db: null,           // IDBDatabase reference
  _persistent: null,   // navigator.storage.persist() result

  // ── Init: detect backend, open DB, migrate, populate indexes ──
  async init() {
    if (this.isArtifact) { this._backend = 'artifact'; return; }
    try {
      this._db = await this._openDB();
      this._backend = 'indexeddb';
      // Silent migration from localStorage on first IndexedDB boot
      if (localStorage.getItem('elle-idb-migrated') !== 'true') {
        await this._migrateFromLocalStorage();
      }
      // Migrate kv keys to v3 compound format (date:source)
      await this._migrateKVKeysToV3();
      // Populate indexed stores if needed (upgrade or first run)
      await this._populateIndexedStores();
      // Request persistent storage to prevent eviction
      if (navigator.storage && navigator.storage.persist) {
        try { this._persistent = await navigator.storage.persist(); }
        catch { this._persistent = false; }
      }
      console.log(`Hippocampus online: IndexedDB v3 multi-source (persistent: ${this._persistent})`);
    } catch (err) {
      console.warn('IndexedDB unavailable, falling back to localStorage:', err.message || err);
      this._backend = 'localstorage';
      this._db = null;
    }
  },

  // ── Open/create the IndexedDB database (schema v2) ──
  _openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('elle-journal', 3);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        const oldVersion = e.oldVersion;
        // v0 → v1: create kv store
        if (oldVersion < 1) {
          if (!db.objectStoreNames.contains('kv')) {
            db.createObjectStore('kv', { keyPath: 'key' });
          }
        }
        // v1 → v2: create indexed stores
        if (oldVersion < 2) {
          if (!db.objectStoreNames.contains('episodes')) {
            const epStore = db.createObjectStore('episodes', { keyPath: 'date' });
            epStore.createIndex('tags', 'tags', { unique: false, multiEntry: true });
          }
          if (!db.objectStoreNames.contains('decisions')) {
            const decStore = db.createObjectStore('decisions', { keyPath: 'id' });
            decStore.createIndex('workstream', 'workstream', { unique: false });
            decStore.createIndex('date', 'date', { unique: false });
          }
        }
        // v2 → v3: multi-source support — rebuild episodes with id keyPath, add source indexes
        if (oldVersion >= 2 && oldVersion < 3) {
          // episodes store: must recreate with keyPath:'id' instead of 'date'
          if (db.objectStoreNames.contains('episodes')) {
            db.deleteObjectStore('episodes');
          }
          const epStore = db.createObjectStore('episodes', { keyPath: 'id' });
          epStore.createIndex('tags', 'tags', { unique: false, multiEntry: true });
          epStore.createIndex('source', 'source', { unique: false });
          epStore.createIndex('date', 'date', { unique: false });

          // decisions: add source index
          if (db.objectStoreNames.contains('decisions')) {
            const decStore = e.target.transaction.objectStore('decisions');
            if (!decStore.indexNames.contains('source')) {
              decStore.createIndex('source', 'source', { unique: false });
            }
          }
        }
        // Fresh install jumping straight to v3
        if (oldVersion < 2) {
          // episodes was just created above with keyPath:'date' — delete and recreate
          if (db.objectStoreNames.contains('episodes')) {
            db.deleteObjectStore('episodes');
          }
          const epStore = db.createObjectStore('episodes', { keyPath: 'id' });
          epStore.createIndex('tags', 'tags', { unique: false, multiEntry: true });
          epStore.createIndex('source', 'source', { unique: false });
          epStore.createIndex('date', 'date', { unique: false });

          if (db.objectStoreNames.contains('decisions')) {
            const decStore = e.target.transaction.objectStore('decisions');
            if (!decStore.indexNames.contains('source')) {
              decStore.createIndex('source', 'source', { unique: false });
            }
          }
        }
      };
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
      request.onblocked = () => reject(new Error('IndexedDB blocked by another tab'));
    });
  },

  // ── Migrate localStorage → kv store ──
  _migrateFromLocalStorage() {
    return new Promise((resolve, reject) => {
      const keysToMigrate = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith('journal:') || k.startsWith('savestate:')) keysToMigrate.push(k);
      }
      if (keysToMigrate.length === 0) {
        localStorage.setItem('elle-idb-migrated', 'true');
        localStorage.setItem('elle-idb-migration-date', new Date().toISOString());
        console.log('Migration: no legacy data found, marked complete.');
        return resolve();
      }
      const tx = this._db.transaction('kv', 'readwrite');
      const store = tx.objectStore('kv');
      for (const k of keysToMigrate) {
        const raw = localStorage.getItem(k);
        if (raw !== null) store.put({ key: k, value: raw });
      }
      tx.oncomplete = () => {
        localStorage.setItem('elle-idb-migrated', 'true');
        localStorage.setItem('elle-idb-migration-date', new Date().toISOString());
        console.log(`Migration complete: ${keysToMigrate.length} records moved to IndexedDB.`);
        resolve();
      };
      tx.onerror = (e) => {
        console.error('Migration failed, reverting to localStorage:', e.target.error);
        this._backend = 'localstorage'; this._db = null; resolve();
      };
      tx.onabort = (e) => {
        console.error('Migration aborted, reverting to localStorage:', e.target.error);
        this._backend = 'localstorage'; this._db = null; resolve();
      };
    });
  },

  // ── Migrate kv keys from v2 (date-only) to v3 (date:source) format ──
  async _migrateKVKeysToV3() {
    if (localStorage.getItem('elle-v3-migrated') === 'true') return;
    if (this._backend !== 'indexeddb') return;
    try {
      const allKV = await new Promise((resolve, reject) => {
        const records = [];
        const tx = this._db.transaction('kv', 'readonly');
        const req = tx.objectStore('kv').openCursor();
        req.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) { records.push(cursor.value); cursor.continue(); }
          else resolve(records);
        };
        req.onerror = (e) => reject(e.target.error);
      });
      const toMigrate = allKV.filter(rec => {
        if (!rec.key.startsWith('journal:') && !rec.key.startsWith('savestate:')) return false;
        const parts = rec.key.split(':');
        // Old format: prefix:YYYY-MM-DD (2 parts). New format: prefix:YYYY-MM-DD:source (3+ parts)
        return parts.length === 2;
      });
      if (toMigrate.length > 0) {
        const tx = this._db.transaction('kv', 'readwrite');
        const store = tx.objectStore('kv');
        for (const rec of toMigrate) {
          store.delete(rec.key);
          store.put({ key: rec.key + ':default', value: rec.value });
        }
        await new Promise((resolve, reject) => {
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e.target.error);
        });
        console.log(`v3 migration: rewrote ${toMigrate.length} kv keys with :default suffix`);
      }
      localStorage.setItem('elle-v3-migrated', 'true');
    } catch (err) {
      console.warn('v3 kv key migration failed:', err.message || err);
    }
  },

  // ── Populate episodes + decisions stores from kv (runs once per schema version) ──
  async _populateIndexedStores() {
    if (localStorage.getItem('elle-indexed-populated') === '3') return;
    if (this._backend !== 'indexeddb') return;
    try {
      // Read all kv records
      const allKV = await new Promise((resolve, reject) => {
        const records = [];
        const tx = this._db.transaction('kv', 'readonly');
        const req = tx.objectStore('kv').openCursor();
        req.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) { records.push(cursor.value); cursor.continue(); }
          else resolve(records);
        };
        req.onerror = (e) => reject(e.target.error);
      });

      // Sort into journals and save-states by composite key (date:source)
      const journalMap = {}, ssMap = {};
      for (const rec of allKV) {
        if (rec.key.startsWith('journal:')) {
          const { date, source } = parseCompoundKey(rec.key);
          const ck = `${date}:${source}`;
          journalMap[ck] = JSON.parse(rec.value);
        } else if (rec.key.startsWith('savestate:')) {
          const { date, source } = parseCompoundKey(rec.key);
          const ck = `${date}:${source}`;
          ssMap[ck] = JSON.parse(rec.value);
        }
      }

      // Build and write episodes + decisions in a single transaction
      const allKeys = new Set([...Object.keys(journalMap), ...Object.keys(ssMap)]);
      const tx = this._db.transaction(['episodes', 'decisions'], 'readwrite');
      const epStore = tx.objectStore('episodes');
      const decStore = tx.objectStore('decisions');
      epStore.clear(); decStore.clear();

      for (const ck of allKeys) {
        const [date, source] = [ck.split(':')[0], ck.split(':').slice(1).join(':')];
        const entry = journalMap[ck] || null;
        const ss = ssMap[ck] || null;
        epStore.put(buildEpisodeRecord(date, source, entry, ss));
        if (ss?.decisions) {
          ss.decisions.forEach((dec, i) => {
            if (dec.decision) decStore.put({ id: `${date}:${source}:${i}`, date, source, ...dec, timestamp: ss.timestamp });
          });
        }
      }

      await new Promise((resolve, reject) => {
        tx.oncomplete = () => resolve();
        tx.onerror = (e) => reject(e.target.error);
      });

      localStorage.setItem('elle-indexed-populated', '3');
      console.log(`Indexed stores populated: ${allKeys.size} episodes, from kv.`);
    } catch (err) {
      console.warn('Index population failed (will use in-memory fallback):', err.message || err);
    }
  },

  // ── Convenience: get kv object store ──
  _store(mode) {
    return this._db.transaction('kv', mode).objectStore('kv');
  },

  // ── Core API (unchanged signatures) ──

  async get(key) {
    if (this._backend === 'artifact') {
      try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; } catch { return null; }
    }
    if (this._backend === 'indexeddb') {
      try {
        return new Promise((resolve, reject) => {
          const req = this._store('readonly').get(key);
          req.onsuccess = () => resolve(req.result ? JSON.parse(req.result.value) : null);
          req.onerror = (e) => reject(e.target.error);
        });
      } catch { return null; }
    }
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : null; } catch { return null; }
  },

  async set(key, value) {
    if (this._backend === 'artifact') {
      try { await window.storage.set(key, JSON.stringify(value)); return true; } catch { return false; }
    }
    if (this._backend === 'indexeddb') {
      try {
        return new Promise((resolve, reject) => {
          const req = this._store('readwrite').put({ key, value: JSON.stringify(value) });
          req.onsuccess = () => resolve(true);
          req.onerror = (e) => reject(e.target.error);
        });
      } catch { return false; }
    }
    try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch { return false; }
  },

  async delete(key) {
    if (this._backend === 'artifact') {
      try { await window.storage.delete(key); return true; } catch { return false; }
    }
    if (this._backend === 'indexeddb') {
      try {
        return new Promise((resolve, reject) => {
          const req = this._store('readwrite').delete(key);
          req.onsuccess = () => resolve(true);
          req.onerror = (e) => reject(e.target.error);
        });
      } catch { return false; }
    }
    try { localStorage.removeItem(key); return true; } catch { return false; }
  },

  async listKeys(prefix) {
    if (this._backend === 'artifact') {
      try { const r = await window.storage.list(prefix); return r?.keys || []; } catch { return []; }
    }
    if (this._backend === 'indexeddb') {
      try {
        return new Promise((resolve, reject) => {
          const keys = [];
          const range = IDBKeyRange.bound(prefix, prefix + '\uffff');
          const req = this._store('readonly').openKeyCursor(range);
          req.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) { keys.push(cursor.key); cursor.continue(); }
            else resolve(keys);
          };
          req.onerror = (e) => reject(e.target.error);
        });
      } catch { return []; }
    }
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith(prefix)) keys.push(k);
    }
    return keys;
  },

  // ── Dual-write: episodes + decisions (no-op on non-IndexedDB backends) ──

  async writeEpisode(date, source, entry, saveState) {
    if (this._backend !== 'indexeddb') return;
    try {
      const record = buildEpisodeRecord(date, source, entry, saveState);
      return new Promise((resolve, reject) => {
        const tx = this._db.transaction('episodes', 'readwrite');
        tx.objectStore('episodes').put(record);
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    } catch { /* silent */ }
  },

  async deleteEpisode(date, source) {
    if (this._backend !== 'indexeddb') return;
    const id = `${date}:${source || 'default'}`;
    try {
      return new Promise((resolve, reject) => {
        const tx = this._db.transaction('episodes', 'readwrite');
        tx.objectStore('episodes').delete(id);
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    } catch { /* silent */ }
  },

  async writeDecisions(date, source, decisions, timestamp) {
    if (this._backend !== 'indexeddb') return;
    const src = source || 'default';
    try {
      return new Promise((resolve, reject) => {
        const tx = this._db.transaction('decisions', 'readwrite');
        const store = tx.objectStore('decisions');
        // Delete existing decisions for this date+source via cursor scan
        const req = store.openCursor();
        req.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            // Match decisions with this date and source
            if (cursor.value.date === date && (cursor.value.source || 'default') === src) {
              store.delete(cursor.primaryKey);
            }
            cursor.continue();
          }
        };
        // Insert new decisions (runs after deletes within same transaction)
        decisions.forEach((dec, i) => {
          if (dec.decision) store.put({ id: `${date}:${src}:${i}`, date, source: src, ...dec, timestamp });
        });
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    } catch { /* silent */ }
  },

  async deleteDecisionsForDate(date, source) {
    if (this._backend !== 'indexeddb') return;
    const src = source || 'default';
    try {
      return new Promise((resolve, reject) => {
        const tx = this._db.transaction('decisions', 'readwrite');
        const store = tx.objectStore('decisions');
        const req = store.openCursor();
        req.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            if (cursor.value.date === date && (cursor.value.source || 'default') === src) {
              store.delete(cursor.primaryKey);
            }
            cursor.continue();
          }
        };
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    } catch { /* silent */ }
  },

  // ── Indexed queries (with in-memory fallbacks) ──

  async getEpisodesByTag(tag) {
    if (this._backend === 'indexeddb') {
      try {
        return new Promise((resolve, reject) => {
          const results = [];
          const tx = this._db.transaction('episodes', 'readonly');
          const idx = tx.objectStore('episodes').index('tags');
          const req = idx.openCursor(IDBKeyRange.only(tag));
          req.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) { results.push(cursor.value); cursor.continue(); }
            else resolve(results.sort((a, b) => b.date.localeCompare(a.date)));
          };
          req.onerror = (e) => reject(e.target.error);
        });
      } catch { /* fall through to in-memory */ }
    }
    // In-memory fallback
    return Object.values(entries)
      .filter(e => (e.tags || []).includes(tag))
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  },

  async getDecisionsByWorkstream(workstream) {
    if (this._backend === 'indexeddb') {
      try {
        return new Promise((resolve, reject) => {
          const results = [];
          const tx = this._db.transaction('decisions', 'readonly');
          const idx = tx.objectStore('decisions').index('workstream');
          const req = idx.openCursor(IDBKeyRange.only(workstream));
          req.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) { results.push(cursor.value); cursor.continue(); }
            else resolve(results.sort((a, b) => b.date.localeCompare(a.date)));
          };
          req.onerror = (e) => reject(e.target.error);
        });
      } catch { /* fall through */ }
    }
    const results = [];
    for (const ss of Object.values(saveStates)) {
      if (ss.decisions) ss.decisions.forEach(d => {
        if (d.workstream === workstream) results.push({ ...d, date: ss.date });
      });
    }
    return results.sort((a, b) => b.date.localeCompare(a.date));
  },

  async getDecisionsByDateRange(from, to) {
    if (this._backend === 'indexeddb') {
      try {
        return new Promise((resolve, reject) => {
          const results = [];
          const tx = this._db.transaction('decisions', 'readonly');
          const idx = tx.objectStore('decisions').index('date');
          const req = idx.openCursor(IDBKeyRange.bound(from, to));
          req.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) { results.push(cursor.value); cursor.continue(); }
            else resolve(results.sort((a, b) => b.date.localeCompare(a.date)));
          };
          req.onerror = (e) => reject(e.target.error);
        });
      } catch { /* fall through */ }
    }
    const results = [];
    for (const ss of Object.values(saveStates)) {
      if (ss.date >= from && ss.date <= to && ss.decisions) {
        ss.decisions.forEach(d => { if (d.decision) results.push({ ...d, date: ss.date }); });
      }
    }
    return results.sort((a, b) => b.date.localeCompare(a.date));
  },

  async rebuildIndexedStores() {
    if (this._backend !== 'indexeddb') return;
    localStorage.removeItem('elle-indexed-populated');
    localStorage.removeItem('elle-v3-migrated');
    await this._migrateKVKeysToV3();
    await this._populateIndexedStores();
  }
};

// ── SOURCE HELPERS ──
function getEntriesForDate(date) {
  const result = {};
  for (const [key, val] of Object.entries(entries)) {
    const [d, ...rest] = key.split(':');
    if (d === date) result[rest.join(':') || 'default'] = val;
  }
  return result;
}

function getSaveStatesForDate(date) {
  const result = {};
  for (const [key, val] of Object.entries(saveStates)) {
    const [d, ...rest] = key.split(':');
    if (d === date) result[rest.join(':') || 'default'] = val;
  }
  return result;
}

function dateHasAnyContent(date) {
  const ents = getEntriesForDate(date);
  const sss = getSaveStatesForDate(date);
  return Object.values(ents).some(e => hasContent(e)) || Object.values(sss).some(s => hasSaveStateContent(s));
}

function dateSourcesWithContent(date) {
  const sources = new Set();
  for (const [key, val] of Object.entries(entries)) {
    const [d, ...rest] = key.split(':');
    if (d === date && hasContent(val)) sources.add(rest.join(':') || 'default');
  }
  for (const [key, val] of Object.entries(saveStates)) {
    const [d, ...rest] = key.split(':');
    if (d === date && hasSaveStateContent(val)) sources.add(rest.join(':') || 'default');
  }
  return [...sources];
}

function compositeKey(date, source) { return `${date}:${source || 'default'}`; }

// ── DATE HELPERS ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseDate(s) { return new Date(s + 'T12:00:00'); }

function formatDate(s) {
  const d = parseDate(s);
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function relativeDay(s) {
  const today = parseDate(todayStr());
  const target = parseDate(s);
  const diff = Math.round((today - target) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return `${diff} days ago`;
  if (diff < 14) return 'Last week';
  return `${Math.floor(diff / 7)} weeks ago`;
}

function getLast7Days() {
  const days = [];
  const now = new Date();
  now.setDate(now.getDate() + (weekOffset * 7));
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    days.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return days;
}

function getWeekLabel() {
  const days = getLast7Days();
  const first = parseDate(days[0]);
  const last = parseDate(days[6]);
  const mo = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${mo(first)} — ${mo(last)}`;
}

function dayAbbr(s) {
  return parseDate(s).toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
}

function dayNum(s) {
  return parseDate(s).getDate();
}

// ── UTILITIES ──
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function hasContent(entry) {
  if (!entry) return false;
  return CATEGORIES.some(c => entry[c.key]?.trim());
}

function getAllTags() {
  const tagSet = new Set();
  for (const e of Object.values(entries)) {
    if (e.tags) e.tags.forEach(t => tagSet.add(t));
  }
  for (const s of Object.values(saveStates)) {
    if (s.tags) s.tags.forEach(t => tagSet.add(t));
  }
  return [...tagSet].sort();
}

function hasSaveStateContent(ss) {
  if (!ss) return false;
  const hasField = (v) => {
    if (!v) return false;
    if (typeof v === 'string') return !!v.trim();
    if (typeof v === 'object') return Object.values(v).some(s => typeof s === 'string' && s.trim());
    return false;
  };
  return ['vibe','hotCache','zeigarnikTension','guardrails','antiGoals','wakeUpInjection'].some(k => hasField(ss[k])) ||
         ['knownTrue','inferred','unknown'].some(k => ss.truthStatus?.[k]?.trim()) ||
         ss.decisions?.length > 0;
}

// ── DATA OPERATIONS ──
async function loadAll() {
  // Load custom sources
  customSources = await StorageAdapter.get('elle:sources') || [];

  const jKeys = await StorageAdapter.listKeys('journal:');
  for (const k of jKeys) {
    const { date, source } = parseCompoundKey(k);
    entries[compositeKey(date, source)] = await StorageAdapter.get(k);
  }
  const sKeys = await StorageAdapter.listKeys('savestate:');
  for (const k of sKeys) {
    const { date, source } = parseCompoundKey(k);
    saveStates[compositeKey(date, source)] = await StorageAdapter.get(k);
  }
}

async function saveEntry(date, source, data) {
  const src = source || 'default';
  data.date = date;
  data.source = src;
  data.timestamp = new Date().toISOString();
  const ck = compositeKey(date, src);
  entries[ck] = data;
  await StorageAdapter.set(sourceKey('journal', date, src), data);
  await StorageAdapter.writeEpisode(date, src, data, saveStates[ck] || null);
}

async function deleteEntry(date, source) {
  const src = source || selectedSource;
  const ck = compositeKey(date, src);
  delete entries[ck];
  await StorageAdapter.delete(sourceKey('journal', date, src));
  if (saveStates[ck]) {
    await StorageAdapter.writeEpisode(date, src, null, saveStates[ck]);
  } else {
    await StorageAdapter.deleteEpisode(date, src);
  }
}

async function saveSaveState(date, source, data) {
  const src = source || 'default';
  data.date = date;
  data.source = src;
  data.timestamp = new Date().toISOString();
  // Auto-derive tags from decision workstreams
  const wsSet = new Set(data.tags || []);
  if (data.decisions) data.decisions.forEach(d => { if (d.workstream) wsSet.add(d.workstream); });
  data.tags = [...wsSet];
  const ck = compositeKey(date, src);
  saveStates[ck] = data;
  await StorageAdapter.set(sourceKey('savestate', date, src), data);
  await StorageAdapter.writeEpisode(date, src, entries[ck] || null, data);
  await StorageAdapter.writeDecisions(date, src, data.decisions || [], data.timestamp);
}

async function deleteSaveState(date, source) {
  const src = source || selectedSource;
  const ck = compositeKey(date, src);
  delete saveStates[ck];
  await StorageAdapter.delete(sourceKey('savestate', date, src));
  if (entries[ck] && hasContent(entries[ck])) {
    await StorageAdapter.writeEpisode(date, src, entries[ck], null);
  } else {
    await StorageAdapter.deleteEpisode(date, src);
  }
  await StorageAdapter.deleteDecisionsForDate(date, src);
}

// ── GENERATE FROM JOURNAL ──
function generateSaveStateFromJournal(entry, source) {
  if (!entry) return {};
  const buildItems = (entry.builds || '').split('\n').filter(l => l.trim()).map(l => '• ' + l.trim()).join('\n');
  const momentumItems = (entry.momentum || '').split('\n').filter(l => l.trim()).map(l => '• ' + l.trim()).join('\n');
  const hotCache = [buildItems, momentumItems].filter(Boolean).join('\n');
  const highlightItems = (entry.highlights || '').split('\n').filter(l => l.trim()).map(l => '• ' + l.trim()).join('\n');
  const decisionItems = (entry.decisions || '').split('\n').filter(l => l.trim()).map(l => '• ' + l.trim()).join('\n');
  const knownTrue = [highlightItems, decisionItems].filter(Boolean).join('\n');

  return {
    vibe: { state: entry.vibe || '', directive: '' },
    hotCache,
    zeigarnikTension: { primary: '', secondary: entry.openThreads || '' },
    guardrails: 'No greetings, no recap, no "as an AI" throat-clearing. Stay in the current operational frame.',
    truthStatus: { knownTrue, inferred: '', unknown: '' },
    wakeUpInjection: { primary: '', fallback: '' },
  };
}

// ── PARSE ELLE'S SESSION CAPTURE ──
function parseSessionCapture(text) {
  const journal = {};
  const ss = { truthStatus: {} };
  const warnings = [];

  // Journal section
  const journalMatch = text.match(/\[JOURNAL ENTRY\]([\s\S]*?)(?=\[KINETIC SAVE-STATE\]|--- END SESSION CAPTURE ---|$)/);
  if (journalMatch) {
    const block = journalMatch[1];
    const lines = block.split('\n');
    let currentKey = null;
    let currentLines = [];

    const iconToKey = { '✦': 'highlights', '⚙': 'builds', '⚖': 'decisions', '→': 'openThreads', '↑': 'momentum', '♥': 'personal', '~': 'vibe' };
    const iconPattern = /^[✦⚙⚖→↑♥~]\s+[\w\s&]+:\s*/;

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) { if (currentKey) currentLines.push(''); continue; }

      let matched = false;
      for (const [icon, key] of Object.entries(iconToKey)) {
        if (trimmed.startsWith(icon)) {
          // Save previous
          if (currentKey) journal[currentKey] = currentLines.join('\n').trim();
          currentKey = key;
          currentLines = [];
          // Extract content after "Icon Label: "
          const afterLabel = trimmed.replace(iconPattern, '').trim() || trimmed.substring(trimmed.indexOf(':') + 1).trim();
          if (afterLabel && afterLabel !== trimmed) currentLines.push(afterLabel);
          else {
            const colonIdx = trimmed.indexOf(':');
            if (colonIdx > -1) currentLines.push(trimmed.substring(colonIdx + 1).trim());
          }
          matched = true;
          break;
        }
      }
      if (!matched && currentKey) {
        currentLines.push(trimmed);
      }
    }
    if (currentKey) journal[currentKey] = currentLines.join('\n').trim();
  } else {
    warnings.push('No [JOURNAL ENTRY] section found');
  }

  // Save-state section
  const ssMatch = text.match(/\[KINETIC SAVE-STATE\]([\s\S]*?)(?=--- END SESSION CAPTURE ---|$)/);
  if (ssMatch) {
    const block = ssMatch[1];

    // Field lookahead includes all possible section headers
    const fieldHeaders = 'VIBE|HOT CACHE|THE ZEIGARNIK TENSION|DECISIONS|GUARDRAILS|ANTI-GOALS|TRUTH STATUS|THE WAKE-UP INJECTION|SESSION METRICS';
    const extractField = (label) => {
      const re = new RegExp('\\[' + label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\]:\\s*([\\s\\S]*?)(?=\\n\\[(?:' + fieldHeaders + ')\\]|--- END|$)', 'i');
      const m = block.match(re);
      return m ? m[1].trim() : '';
    };

    // VIBE — v2.5: parse State/Directive sub-fields; v2.1 fallback to flat string
    const vibeRaw = extractField('VIBE');
    if (/State:/i.test(vibeRaw)) {
      const stateM = vibeRaw.match(/State:\s*([\s\S]*?)(?=\n\s*Directive:|$)/i);
      const dirM = vibeRaw.match(/Directive:\s*([\s\S]*?)$/i);
      ss.vibe = { state: stateM ? stateM[1].trim() : vibeRaw, directive: dirM ? dirM[1].trim() : '' };
    } else {
      ss.vibe = { state: vibeRaw, directive: '' };
    }
    ss.hotCache = extractField('HOT CACHE');
    // ZEIGARNIK — v2.5: parse Primary/Secondary sub-fields; v2.1 fallback
    const zeigRaw = extractField('THE ZEIGARNIK TENSION');
    if (/Primary:/i.test(zeigRaw)) {
      const priM = zeigRaw.match(/Primary:\s*([\s\S]*?)(?=\n\s*Secondary:|$)/i);
      const secM = zeigRaw.match(/Secondary:\s*([\s\S]*?)$/i);
      ss.zeigarnikTension = { primary: priM ? priM[1].trim() : '', secondary: secM ? secM[1].trim() : '' };
    } else {
      ss.zeigarnikTension = { primary: '', secondary: zeigRaw };
    }
    ss.guardrails = extractField('GUARDRAILS');
    ss.antiGoals = extractField('ANTI-GOALS');

    // Decision Objects — parse structured blocks
    const decisionsRaw = extractField('DECISIONS');
    ss.decisions = [];
    if (decisionsRaw) {
      // Match each { ... } block
      const decBlocks = decisionsRaw.match(/\{[\s\S]*?\}/g) || [];
      for (const db of decBlocks) {
        const dec = {};
        const fieldMatch = (key) => {
          const m = db.match(new RegExp(key + ':\\s*"?([^"\\n}]*)"?', 'i'));
          return m ? m[1].trim() : '';
        };
        dec.decision = fieldMatch('decision');
        dec.rationale = fieldMatch('rationale');
        // Alternatives: parse array or comma-separated
        const altMatch = db.match(/alternatives:\s*\[([^\]]*)\]/i);
        dec.alternatives = altMatch ? altMatch[1].split(',').map(s => s.replace(/"/g, '').trim()).filter(Boolean) : [];
        dec.reversibility = fieldMatch('reversibility');
        dec.confidence = fieldMatch('confidence');
        dec.date = fieldMatch('date');
        dec.workstream = fieldMatch('workstream');
        if (dec.decision) ss.decisions.push(dec);
      }
    }

    // Truth status
    const tsMatch = block.match(/\[TRUTH STATUS\]:\s*([\s\S]*?)(?=\[THE WAKE-UP INJECTION\]|--- END|$)/i);
    if (tsMatch) {
      const tsBlock = tsMatch[1];
      const ktMatch = tsBlock.match(/KNOWN TRUE:\s*([\s\S]*?)(?=\n\s*INFERRED:|\n\s*UNKNOWN:|$)/i);
      const infMatch = tsBlock.match(/INFERRED:\s*([\s\S]*?)(?=\n\s*UNKNOWN:|$)/i);
      const unkMatch = tsBlock.match(/UNKNOWN:\s*(.*)/i);
      ss.truthStatus.knownTrue = ktMatch ? ktMatch[1].trim() : '';
      ss.truthStatus.inferred = infMatch ? infMatch[1].trim() : '';
      ss.truthStatus.unknown = unkMatch ? unkMatch[1].trim() : '';
    }

    // Wake-up injection — v2.5: parse Primary/Fallback; v2.1 fallback
    const wakeMatch = block.match(/\[THE WAKE-UP INJECTION\]:\s*"?([\s\S]*?)"?\s*(?=\n\[SESSION METRICS\]|--- END|$)/i);
    if (wakeMatch) {
      const wakeRaw = wakeMatch[1].replace(/^"|"$/g, '').trim();
      if (/Primary:/i.test(wakeRaw)) {
        const priM = wakeRaw.match(/Primary:\s*"?([\s\S]*?)"?\s*(?=\n\s*Fallback:|$)/i);
        const fbM = wakeRaw.match(/Fallback:\s*"?([\s\S]*?)"?\s*$/i);
        ss.wakeUpInjection = { primary: priM ? priM[1].trim() : '', fallback: fbM ? fbM[1].trim() : '' };
      } else {
        ss.wakeUpInjection = { primary: wakeRaw, fallback: '' };
      }
    } else {
      ss.wakeUpInjection = { primary: '', fallback: '' };
    }

    // Session Metrics — v2.5: adds priorShockScore and delta
    const metricsRaw = extractField('SESSION METRICS');
    ss.metrics = {};
    if (metricsRaw) {
      const tokM = metricsRaw.match(/Token[s]?\s*(?:Estimate|Count)?:\s*~?(\d+)/i);
      const wsM = metricsRaw.match(/Workstream[s]?\s*(?:Count)?:\s*(\d+)/i);
      const shockM = metricsRaw.match(/Shock\s*Score:\s*(\d+)/i);
      const priorM = metricsRaw.match(/Prior\s*Shock\s*Score:\s*(\d+)/i);
      const deltaM = metricsRaw.match(/Delta:\s*([+-]?\d+)/i);
      if (tokM) ss.metrics.tokenEstimate = parseInt(tokM[1], 10);
      if (wsM) ss.metrics.workstreamCount = parseInt(wsM[1], 10);
      if (shockM) ss.metrics.shockScore = parseInt(shockM[1], 10);
      if (priorM) ss.metrics.priorShockScore = parseInt(priorM[1], 10);
      if (deltaM) ss.metrics.delta = parseInt(deltaM[1], 10);
    }

    if (!ss.vibe && !ss.hotCache) warnings.push('Save-state fields may be incomplete');
  } else {
    warnings.push('No [KINETIC SAVE-STATE] section found');
  }

  return { journal, saveState: ss, warnings };
}

// ── WORKSTREAMS DASHBOARD ──
async function renderWorkstreams() {
  const el = document.getElementById('view-workstreams');
  if (workstreamView === 'detail' && selectedWorkstream) {
    return renderWorkstreamDetail(el);

  const allTags = getAllTags();

    const episodes = await StorageAdapter.getEpisodesByTag(tag);
    const decisions = await StorageAdapter.getDecisionsByWorkstream(tag);
    const dates = episodes.map(ep => ep.date).sort();
    stats.push({
      tag, episodeCount: episodes.length, decisionCount: decisions.length,
      first: dates[0] || '', last: dates[dates.length - 1] || ''
    });

  stats.sort((a, b) => b.last.localeCompare(a.last)); // most recent first

  let html = `<div class="date-display"><div class="date-display-text">Workstream Dashboard</div></div>`;

    html += `<div class="empty-state"><div class="empty-state-icon">🏷</div>

      html += `<div class="timeline-card" onclick="drillIntoWorkstream('${esc(s.tag)}')" style="cursor:pointer">

          <span class="timeline-day" style="color:var(--gold-bright)">#${esc(s.tag)}</span>

          ${d.reversibility ? `<span>${d.reversibility}</span>` : ''}
          ${d.confidence ? `<span>${d.confidence} confidence</span>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
  }

  // Episodes timeline
  if (episodes.length > 0) {
    html += `<div class="savestate-section">
      <div class="section-header"><span class="section-icon">📖</span>Episode Timeline</div>`;
    for (const ep of episodes) {
      const preview = ep.highlights?.substring(0, 120) || ep.momentum?.substring(0, 120) || ep.openThreads?.substring(0, 120) || '';
      html += `<div class="timeline-card" onclick="goToDate('${ep.date}')" style="cursor:pointer">
        <div class="timeline-card-header">
          <span class="timeline-day">${formatDate(ep.date)}</span>
          ${ep.hasSaveState ? '<span style="color:var(--gold);font-size:11px">⚡ save-state</span>' : ''}
        </div>
        ${preview ? `<div class="timeline-preview">${esc(preview.trim())}${preview.length >= 120 ? '...' : ''}</div>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

// ── BRIEFING GENERATORS ──

function getActiveBriefingSources() {
  // Returns source IDs to include in briefing. Empty briefingSources = all.
  if (briefingSources.length > 0) return briefingSources;
  return getAllSources().map(s => s.id);
}

function getFilteredEntriesForDate(date) {
  const all = getEntriesForDate(date);
  const active = getActiveBriefingSources();
  const result = {};
  for (const [src, e] of Object.entries(all)) {
    if (active.includes(src)) result[src] = e;
  }
  return result;
}

function getFilteredSaveStatesForDate(date) {
  const all = getSaveStatesForDate(date);
  const active = getActiveBriefingSources();
  const result = {};
  for (const [src, ss] of Object.entries(all)) {
    if (active.includes(src)) result[src] = ss;
  }
  return result;
}

function generateStructuredBriefing() {
  const lines = [];
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

  const yesterdayEntries = getFilteredEntriesForDate(yesterdayStr);
  const srcKeys = Object.keys(yesterdayEntries).filter(s => hasContent(yesterdayEntries[s]));
  const multiSource = srcKeys.length > 1;

  if (srcKeys.length > 0) {
    lines.push(`═══ YESTERDAY (${formatDate(yesterdayStr)}) ═══\n`);
    for (const c of CATEGORIES) {
      const parts = [];
      for (const src of srcKeys) {
        const e = yesterdayEntries[src];
        if (e?.[c.key]?.trim()) {
          if (multiSource) parts.push(`[${getSourceLabel(src)}] ${e[c.key].trim()}`);
          else parts.push(e[c.key].trim());
        }
      }
      if (parts.length > 0) {
        lines.push(`${c.icon} ${c.label.toUpperCase()}`);
        lines.push(parts.join('\n'));
        lines.push('');
      }
    }
  }

  // Open threads from last 7 days — aggregate across sources
  const days = getLast7Days();
  const threads = [];
  for (const d of days) {
    const dateEntries = getFilteredEntriesForDate(d);
    for (const [src, e] of Object.entries(dateEntries)) {
      if (e?.openThreads?.trim()) {
        const label = Object.keys(dateEntries).length > 1 ? ` [${getSourceLabel(src)}]` : '';
        threads.push({ date: d, label, content: e.openThreads.trim() });
      }
    }
  }
  if (threads.length > 0) {
    lines.push('═══ OPEN THREADS (Last 7 Days) ═══\n');
    for (const t of threads) {
      lines.push(`[${t.date}]${t.label} ${t.content}`);
      lines.push('');
    }
  }

  // Momentum trends (last 3 days)
  const momentumDays = days.slice(-3);
  const momentumParts = [];
  for (const d of momentumDays) {
    const dateEntries = getFilteredEntriesForDate(d);
    for (const [src, e] of Object.entries(dateEntries)) {
      if (e?.momentum?.trim()) {
        const label = Object.keys(dateEntries).length > 1 ? ` [${getSourceLabel(src)}]` : '';
        momentumParts.push({ date: d, label, content: e.momentum.trim() });
      }
    }
  }
  if (momentumParts.length > 0) {
    lines.push('═══ MOMENTUM (Last 3 Days) ═══\n');
    for (const m of momentumParts) {
      lines.push(`[${m.date}]${m.label} ${m.content}`);
      lines.push('');
    }
  }

  // Stats
  const uniqueDates = new Set();
  for (const k of Object.keys(entries)) uniqueDates.add(k.split(':')[0]);
  const total = uniqueDates.size;
  let streak = 0;
  const d = new Date();
  while (true) {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (dateHasAnyContent(ds)) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  lines.push(`═══ STATS ═══`);
  lines.push(`Total entries: ${total} day${total !== 1 ? 's' : ''} | Current streak: ${streak} day${streak !== 1 ? 's' : ''}`);

  return lines.join('\n');
}

// ── v2.5 BACKWARD-COMPAT HELPERS ──
// Fields may be strings (v2.1) or objects (v2.5). These extract the correct value from either.
function getVibeState(v)     { return typeof v === 'object' && v ? (v.state || '') : (typeof v === 'string' ? v : ''); }
function getVibeDirective(v) { return typeof v === 'object' && v ? (v.directive || '') : ''; }
function getZeigPrimary(z)   { return typeof z === 'object' && z ? (z.primary || '') : ''; }
function getZeigSecondary(z) { return typeof z === 'object' && z ? (z.secondary || '') : (typeof z === 'string' ? z : ''); }
function getWakePrimary(w)   { return typeof w === 'object' && w ? (w.primary || '') : (typeof w === 'string' ? w : ''); }
function getWakeFallback(w)  { return typeof w === 'object' && w ? (w.fallback || '') : ''; }

function formatSingleWake(ss) {
  let decisionsBlock = '';
  if (ss.decisions?.length > 0) {
    decisionsBlock = '\n[DECISIONS]:\n' + ss.decisions.map(d =>
      `{ decision: "${d.decision}", rationale: "${d.rationale}", alternatives: [${(d.alternatives||[]).map(a => `"${a}"`).join(', ')}], reversibility: ${d.reversibility || 'easy'}, confidence: ${d.confidence || 'medium'} }`
    ).join('\n');
  }
  let antiGoalsBlock = '';
  if (ss.antiGoals?.trim()) {
    antiGoalsBlock = '\n[ANTI-GOALS]:\n' + ss.antiGoals;
  }
  // v2.5: extract sub-fields via backward-compat helpers
  const vibeState = getVibeState(ss.vibe);
  const vibeDir = getVibeDirective(ss.vibe);
  const zeigPri = getZeigPrimary(ss.zeigarnikTension);
  const zeigSec = getZeigSecondary(ss.zeigarnikTension);
  const wakePri = getWakePrimary(ss.wakeUpInjection);
  const wakeFb = getWakeFallback(ss.wakeUpInjection);

  // Build vibe block
  let vibeBlock;
  if (vibeDir) {
    vibeBlock = `\n  State: ${vibeState || '(not set)'}\n  Directive: ${vibeDir}`;
  } else {
    vibeBlock = ` ${vibeState || '(not set)'}`;
  }

  // Build zeigarnik block
  let zeigBlock;
  if (zeigPri) {
    zeigBlock = `\n  Primary: ${zeigPri}${zeigSec ? `\n  Secondary:\n  ${zeigSec.split('\n').join('\n  ')}` : ''}`;
  } else {
    zeigBlock = `\n${zeigSec || '(not set)'}`;
  }

  // Build wake-up block
  let wakeBlock;
  if (wakeFb) {
    wakeBlock = `\n  Primary: "${wakePri || '(not set)'}"\n  Fallback: "${wakeFb}"`;
  } else {
    wakeBlock = ` "${wakePri || '(not set)'}"`;
  }

  // Build metrics block
  const m = ss.metrics;
  let metricsBlock = '';
  if (m && (m.tokenEstimate || m.workstreamCount || m.shockScore)) {
    metricsBlock = `\n[SESSION METRICS]:\n  Token Estimate: ~${m.tokenEstimate || '?'}\n  Workstreams: ${m.workstreamCount || '?'}\n  Shock Score: ${m.shockScore || '?'}/10`;
    if (m.priorShockScore != null) metricsBlock += `\n  Prior Shock Score: ${m.priorShockScore}/10`;
    if (m.delta != null) metricsBlock += `\n  Delta: ${m.delta >= 0 ? '+' : ''}${m.delta}`;
  }

  return `/wake

System Override: Internalize this Kinetic State. Do not say hello. Do not
summarize this back to me. Adopt the [VIBE] State as emotional register and
follow the Directive as behavioral instruction. Load [HOT CACHE] in priority
order (reds first). Pursue Primary [ZEIGARNIK TENSION] as main thread.
Respect [ANTI-GOALS] as hard constraints. Check [TRUTH STATUS] before claims.
Output [THE WAKE-UP INJECTION] Primary as your very first sentence (or Fallback
if >72hr stale). Pick up mid-breath.

--- KINETIC SAVE-STATE ---
[VIBE]:${vibeBlock}
[HOT CACHE]:
${ss.hotCache || '(not set)'}
[THE ZEIGARNIK TENSION]:${zeigBlock}${decisionsBlock}
[GUARDRAILS]:
${ss.guardrails || '(not set)'}${antiGoalsBlock}
[TRUTH STATUS]:
  KNOWN TRUE: ${ss.truthStatus?.knownTrue || '(not set)'}
  INFERRED: ${ss.truthStatus?.inferred || '(not set)'}
  UNKNOWN: ${ss.truthStatus?.unknown || '(not set)'}
[THE WAKE-UP INJECTION]:${wakeBlock}${metricsBlock}
--------------------------`;
}

function formatMergedWake(perSource) {
  const srcLabels = Object.entries(perSource).map(([src, ss]) => `${getSourceLabel(src)} (${ss.date})`).join(', ');
  const srcCount = Object.keys(perSource).length;

  // Merge vibes — v2.5: show State + Directive per source
  const vibes = Object.entries(perSource).map(([src, ss]) => {
    const st = getVibeState(ss.vibe);
    const dir = getVibeDirective(ss.vibe);
    if (!st && !dir) return '';
    let line = `[${getSourceLabel(src)}] State: ${st}`;
    if (dir) line += `\n[${getSourceLabel(src)}] Directive: ${dir}`;
    return line;
  }).filter(Boolean).join('\n');

  const hotCaches = Object.entries(perSource).map(([src, ss]) => {
    if (!ss.hotCache?.trim()) return '';
    return ss.hotCache.trim().split('\n').map(l => `[${getSourceLabel(src)}] ${l}`).join('\n');
  }).filter(Boolean).join('\n');

  // Merge zeigarnik — v2.5: show Primary + Secondary per source
  const tensions = Object.entries(perSource).map(([src, ss]) => {
    const pri = getZeigPrimary(ss.zeigarnikTension);
    const sec = getZeigSecondary(ss.zeigarnikTension);
    if (!pri && !sec) return '';
    let line = '';
    if (pri) line += `[${getSourceLabel(src)}] Primary: ${pri}`;
    if (sec) line += (line ? '\n' : '') + sec.split('\n').map(l => `[${getSourceLabel(src)}] ${l}`).join('\n');
    return line;
  }).filter(Boolean).join('\n');

  // Merge decisions
  const allDecs = [];
  for (const [src, ss] of Object.entries(perSource)) {
    if (ss.decisions) ss.decisions.forEach(d => allDecs.push({ ...d, _source: src }));
  }
  let decisionsBlock = '';
  if (allDecs.length > 0) {
    decisionsBlock = '\n[DECISIONS]:\n' + allDecs.map(d =>
      `[${getSourceLabel(d._source)}] { decision: "${d.decision}", rationale: "${d.rationale}", alternatives: [${(d.alternatives||[]).map(a => `"${a}"`).join(', ')}], reversibility: ${d.reversibility || 'easy'}, confidence: ${d.confidence || 'medium'} }`
    ).join('\n');
  }

  // Union guardrails and anti-goals (deduplicate)
  const guardrailSet = new Set();
  const antiGoalSet = new Set();
  for (const ss of Object.values(perSource)) {
    if (ss.guardrails?.trim()) ss.guardrails.trim().split('\n').forEach(l => guardrailSet.add(l.trim()));
    if (ss.antiGoals?.trim()) ss.antiGoals.trim().split('\n').forEach(l => antiGoalSet.add(l.trim()));
  }
  const guardrails = [...guardrailSet].join('\n');
  let antiGoalsBlock = '';
  if (antiGoalSet.size > 0) antiGoalsBlock = '\n[ANTI-GOALS]:\n' + [...antiGoalSet].join('\n');

  // Merge truth status
  const mergeTS = (field) => Object.entries(perSource).map(([src, ss]) => ss.truthStatus?.[field]?.trim() ? `[${getSourceLabel(src)}] ${ss.truthStatus[field].trim()}` : '').filter(Boolean).join('\n') || '(not set)';

  // Wake-up injection: use most recent, extract via helpers
  const sorted = Object.entries(perSource).sort((a, b) => (b[1].timestamp || '').localeCompare(a[1].timestamp || ''));
  const bestWake = sorted.find(([, ss]) => getWakePrimary(ss.wakeUpInjection))?.[1]?.wakeUpInjection;
  const wakePri = bestWake ? getWakePrimary(bestWake) : '(not set)';
  const wakeFb = bestWake ? getWakeFallback(bestWake) : '';

  // Build wake block
  let wakeBlock;
  if (wakeFb) {
    wakeBlock = `\n  Primary: "${wakePri}"\n  Fallback: "${wakeFb}"`;
  } else {
    wakeBlock = ` "${wakePri}"`;
  }

  // Metrics: sum/max, track priorShockScore/delta from most recent
  let tokenSum = 0, wsCount = 0, maxShock = 0, priorShock = null, delta = null;
  for (const ss of Object.values(perSource)) {
    if (ss.metrics?.tokenEstimate) tokenSum += ss.metrics.tokenEstimate;
    if (ss.metrics?.workstreamCount) wsCount += ss.metrics.workstreamCount;
    if (ss.metrics?.shockScore) maxShock = Math.max(maxShock, ss.metrics.shockScore);
    if (ss.metrics?.priorShockScore != null) priorShock = ss.metrics.priorShockScore;
    if (ss.metrics?.delta != null) delta = ss.metrics.delta;
  }
  let metricsBlock = '';
  if (tokenSum || wsCount || maxShock) {
    metricsBlock = `\n[SESSION METRICS]:\n  Token Estimate: ~${tokenSum || '?'}\n  Workstreams: ${wsCount || '?'}\n  Shock Score: ${maxShock || '?'}/10`;
    if (priorShock != null) metricsBlock += `\n  Prior Shock Score: ${priorShock}/10`;
    if (delta != null) metricsBlock += `\n  Delta: ${delta >= 0 ? '+' : ''}${delta}`;
  }

  return `/wake

System Override: Internalize this Multi-Source Kinetic State. Do not say hello. Do not
summarize this back to me. This state merges ${srcCount} session contexts: ${srcLabels}.
Adopt the composite [VIBE] State and follow each Directive. Load merged [HOT CACHE] in
priority order (reds first). Resolve all [ZEIGARNIK TENSIONS] — Primary first per source.
Respect all [ANTI-GOALS] as hard constraints. Check [TRUTH STATUS] before claims.
Output [THE WAKE-UP INJECTION] Primary as your very first sentence (or Fallback
if >72hr stale). Pick up mid-breath.

--- MERGED KINETIC SAVE-STATE ---
[SOURCES]: ${srcLabels}
[VIBE]:
${vibes || '(not set)'}
[HOT CACHE]:
${hotCaches || '(not set)'}
[THE ZEIGARNIK TENSION]:
${tensions || '(not set)'}${decisionsBlock}
[GUARDRAILS]:
${guardrails || '(not set)'}${antiGoalsBlock}
[TRUTH STATUS]:
  KNOWN TRUE: ${mergeTS('knownTrue')}
  INFERRED: ${mergeTS('inferred')}
  UNKNOWN: ${mergeTS('unknown')}
[THE WAKE-UP INJECTION]:${wakeBlock}${metricsBlock}
--------------------------`;
}

function generateHotResume() {
  const activeSources = getActiveBriefingSources();

  // Find most recent save-state per active source
  const latestPerSource = {};
  for (const [ck, ss] of Object.entries(saveStates)) {
    if (!hasSaveStateContent(ss)) continue;
    const [date, ...srcParts] = ck.split(':');
    const src = srcParts.join(':') || 'default';
    if (!activeSources.includes(src)) continue;
    if (!latestPerSource[src] || date > latestPerSource[src].date) {
      latestPerSource[src] = ss;
    }
  }

  if (Object.keys(latestPerSource).length === 0) {
    return 'No save-state found. Create one in the Save-State tab first.';
  }

  if (Object.keys(latestPerSource).length === 1) {
    return formatSingleWake(Object.values(latestPerSource)[0]);
  }

  return formatMergedWake(latestPerSource);
}

function generateFullContext() {
  const structured = generateStructuredBriefing();
  const hotResume = generateHotResume();

  return `--- ELLE'S FULL CONTEXT LOAD ---

[EPISODIC MEMORY — What happened recently]
${structured}

[EXECUTION STATE — Where we left off]
${hotResume}

--- END CONTEXT LOAD ---`;
}

      <span class="date-chip-num">${dayNum(d)}</span>
      ${hasE ? `<span class="date-chip-dot"></span>${srcCount > 1 ? `<span style="font-family:var(--font-mono);font-size:8px;color:var(--gold-dim);position:absolute;bottom:2px;right:4px">${srcCount}</span>` : ''}` : ''}

    <div class="date-display-text">${formatDate(selectedDate)} · <span style="opacity:0.5;font-size:0.8em">${getSourceIcon(selectedSource)} ${getSourceLabel(selectedSource)}</span></div>`;

function renderTimeline() {
  const el = document.getElementById('view-timeline');
  // Extract unique dates from composite keys
  const allDateSet = new Set();
  for (const k of Object.keys(entries)) allDateSet.add(k.split(':')[0]);
  for (const k of Object.keys(saveStates)) allDateSet.add(k.split(':')[0]);
  const allDates = [...allDateSet].sort().reverse();
  const query = timelineSearch.toLowerCase();

  let html = `<input type="text" class="timeline-search" placeholder="Search entries..." value="${esc(timelineSearch)}" oninput="updateTimelineSearch(this.value)">`;

  // Source filter bar
  const srcs = getAllSources();
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
    <span class="source-row-label" style="align-self:center">Source:</span>
    <span class="tag-filter ${!timelineSourceFilter ? 'active' : ''}" onclick="setTimelineSourceFilter('')">All</span>
    ${srcs.map(s => `<span class="tag-filter ${timelineSourceFilter === s.id ? 'active' : ''}" onclick="setTimelineSourceFilter('${s.id}')">${s.icon} ${esc(s.label)}</span>`).join('')}
  </div>`;

  // Tag filter bar
  const allTags = getAllTags();
  if (allTags.length > 0) {
    html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      <span class="tag-filter ${!timelineTagFilter ? 'active' : ''}" onclick="setTimelineTagFilter('')">All</span>
      ${allTags.map(t => `<span class="tag-filter ${timelineTagFilter === t ? 'active' : ''}" onclick="setTimelineTagFilter('${esc(t)}')">#${esc(t)}</span>`).join('')}
    </div>`;
  }

  const filtered = allDates.filter(d => {
    // Get all entries for this date (optionally filtered by source)
    const dateEntries = getEntriesForDate(d);
    const relevantEntries = timelineSourceFilter
      ? { [timelineSourceFilter]: dateEntries[timelineSourceFilter] }
      : dateEntries;
    const anyContent = Object.values(relevantEntries).some(e => e && hasContent(e));
    if (!anyContent) return false;

    if (timelineTagFilter) {
      const hasTags = Object.values(relevantEntries).some(e => (e?.tags || []).includes(timelineTagFilter));
      if (!hasTags) return false;
    }
    if (!query) return true;
    if (d.includes(query)) return true;
    if (formatDate(d).toLowerCase().includes(query)) return true;
    return Object.values(relevantEntries).some(e => {
      if (!e) return false;
      if ((e.tags || []).some(t => t.toLowerCase().includes(query))) return true;
      return CATEGORIES.some(c => e[c.key]?.toLowerCase().includes(query));
    });
  });

  if (filtered.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-text">${query ? 'No entries match your search.' : 'No journal entries yet.'}</div>
    </div>`;
  } else {
    for (const d of filtered) {
      const dateEntries = getEntriesForDate(d);
      const dateSS = getSaveStatesForDate(d);
      const dateSources = dateSourcesWithContent(d);
      // Pick a representative entry for preview (first with content)
      const reprSrc = timelineSourceFilter && dateEntries[timelineSourceFilter] ? timelineSourceFilter : dateSources[0] || 'default';
      const e = dateEntries[reprSrc] || Object.values(dateEntries)[0];
      const hasSS = Object.values(dateSS).some(s => hasSaveStateContent(s));
      const filledCats = e ? CATEGORIES.filter(c => e[c.key]?.trim()) : [];
      const preview = e?.highlights?.trim()?.substring(0, 120) || (filledCats[0]?.key ? e[filledCats[0].key]?.trim()?.substring(0, 120) : '') || '';

      html += `<div class="timeline-card" onclick="goToDate('${d}')">
        <div class="timeline-card-header">
          <span class="timeline-day">${relativeDay(d)}</span>
          <span class="timeline-date">${formatDate(d)}</span>
          ${dateSources.length > 0 ? `<span style="font-size:10px;opacity:0.5">${dateSources.map(s => getSourceIcon(s)).join(' ')}</span>` : ''}
          ${hasSS ? '<span class="timeline-badge-ss" title="Has Save-State">⚡</span>' : ''}
        </div>
        <div class="timeline-tags">
          ${filledCats.map(c => `<span class="timeline-tag">${c.icon} ${c.label}</span>`).join('')}
          ${(e?.tags || []).map(t => `<span class="tag-chip" style="font-size:9px;padding:2px 7px">#${esc(t)}</span>`).join('')}
        </div>
        ${preview ? `<div class="timeline-preview">${esc(preview)}${preview.length >= 120 ? '…' : ''}</div>` : ''}
      </div>`;
    }
  }

  el.innerHTML = html;
}

function setTimelineSourceFilter(src) {
  timelineSourceFilter = src;
  renderTimeline();
}

function toggleBriefingSource(srcId) {
  const allSrcIds = getAllSources().map(s => s.id);
  // If briefingSources is empty, initialize it with all sources minus the toggled one
  if (briefingSources.length === 0) {
    briefingSources = allSrcIds.filter(s => s !== srcId);
  } else if (briefingSources.includes(srcId)) {
    briefingSources = briefingSources.filter(s => s !== srcId);
    // If we'd remove all, reset to empty (= all)
    if (briefingSources.length === 0) briefingSources = [];
  } else {
    briefingSources.push(srcId);
    // If all are now selected, reset to empty (= all)
    if (briefingSources.length === allSrcIds.length) briefingSources = [];
  }
  renderBriefing();
}
